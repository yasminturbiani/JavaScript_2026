<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 5</title>
    <script>
        let listaBandas = []
        listaBandas.push('KISS')
        listaBandas.push('Red Hot Chilli Peppers')
        listaBandas.push('Guns n Roses')
        listaBandas.push('Bon Jovi')
        listaBandas.push('Metallica', 'Iron Maiden')
        listaBandas.push('Scorpions', 'Linkin Park', 'ACDC')
        document.write(listaBandas[4])
        document.write('<br>')
        document.write('Total:' + listaBandas.length)
        listaBandas[6] = 'Nirvana'
        listaBandas.splice(2, 1)
        listaBandas.splice(5, 1)

        let conteudo = ''
        for (let i = 0; i < listaBandas.length; i++) {
            conteudo += listaBandas[i] + '<br>'
        }
        document.write('<br>' + conteudo)

        conteudo = ''
        for (i in listaBandas){
            conteudo += listaBandas[i] + '<br>'
        }
        document.write(conteudo)   
        
        conteudo = ''
        let i = 0
        while (i < listaBandas.length) {
            conteudo += listaBandas[i] + '<br>'
            i += 1
        }
        document.write(conteudo)

        conteudo = ''
        i = 0
        do {
            conteudo += listaBandas[i] +'<br>'
            i += 1
        } while (i < listaBandas.length)
        document.write(conteudo)

        

    </script>
</head>
<body>
    
</body>
</html>
