            let num1 = parseFloat(prompt('Digite o primeiro número: '))
            let num2 = parseFloat(prompt('Digite o segundo número: '))

            if (!isNaN(num1) && !isNaN(num2)){
                alert('Operações Disponiveis:\n1 - Adição\n2 - Subtração\n3 - Multiplicação\n4 - Divisão\n')
                // document.write('1 - Adição<br>')

                // document.write('4 - Divisão<br>')
                let op = parseInt(prompt('Operação: '))

                if (!isNaN(op)){
                    switch(op){

                        case 1:     //Somar
                            let soma = num1 + num2
                            document.write(`A soma de ${num1} + ${num2} = ${soma}<br>`)
                            break

                        case 2:     //Subtrair
                            let sub = num1 - num2
                            document.write(`A subtração de ${num1} - ${num2} = ${sub}<br>`)
                            break

                        case 3:     //Multiplicação
                            let mult = num1 * num2
                            document.write(`A multiplicação de ${num1} x ${num2} = ${mult}<br>`)
                            break

                        case 4:     //Divisão
                            if (num2 != 0){
                                let div = num1 / num2
                                document.write(`A divisão de ${num1} / ${num2} = ${div}<br>`)
                            } else {
                                document.write('Digite um número!<br>')
                            }
                            
                            break
                            
                            default:
                            document.write("Operação inválida")
                    }

                } else {

                }
